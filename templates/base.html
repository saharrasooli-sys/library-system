<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Library Management System</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Google Fonts -->

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <!-- Bootstrap Icons -->

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <!-- Custom CSS -->

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

    <style>

        body {

            background-color: #f4f6f9;

            font-family: 'Poppins', sans-serif;

            transition: 0.3s;

        }

        .navbar {

            box-shadow: 0 2px 15px rgba(0,0,0,0.1);

        }

        .navbar-brand {

            font-size: 1.6rem;

            font-weight: bold;

        }

        .nav-btn {

            margin-left: 10px;

            border-radius: 10px;

        }

        .card {

            border: none;

            border-radius: 20px;

            transition: 0.3s;

        }

        .card:hover {

            transform: translateY(-5px);

            box-shadow: 0 10px 25px rgba(0,0,0,0.15);

        }

        footer {

            background: #212529;

            color: white;

            text-align: center;

            padding: 20px;

            margin-top: 50px;

        }

        .dark-mode {

            background-color: #121212 !important;

            color: white !important;

        }

    </style>

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg navbar-dark bg-dark py-3">

    <div class="container">

        <a class="navbar-brand"
           href="/">

            📚 Library System

        </a>

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse"
             id="navbarNav">

            <ul class="navbar-nav ms-auto align-items-center">

                <li class="nav-item">

                    <a class="btn btn-outline-light nav-btn"
                       href="/">

                        <i class="bi bi-house"></i>
                        Home

                    </a>

                </li>

                <li class="nav-item">

                    <a class="btn btn-outline-light nav-btn"
                       href="/books">

                        <i class="bi bi-book"></i>
                        Books

                    </a>

                </li>

                <li class="nav-item">

                    <a class="btn btn-outline-light nav-btn"
                       href="/search">

                        <i class="bi bi-search"></i>
                        Search

                    </a>

                </li>

                <li class="nav-item">

                    <a class="btn btn-outline-light nav-btn"
                       href="/history">

                        <i class="bi bi-clock-history"></i>
                        History

                    </a>

                </li>

                <li class="nav-item">

                    <a class="btn btn-info nav-btn"
                       href="/profile">

                        👤 Profile

                    </a>

                </li>

                <li class="nav-item">

                    <a class="btn btn-success nav-btn"
                       href="/login">

                        <i class="bi bi-box-arrow-in-right"></i>
                        Login

                    </a>

                </li>

                <li class="nav-item">

                    <a class="btn btn-primary nav-btn"
                       href="/register">

                        <i class="bi bi-person-plus"></i>
                        Register

                    </a>

                </li>

                <li class="nav-item">

                    <button class="btn btn-warning nav-btn"
                            onclick="toggleDarkMode()">

                        🌙 Dark

                    </button>

                </li>

                <li class="nav-item">

                    <button class="btn btn-danger nav-btn"
                            onclick="logout()">

                        Logout

                    </button>

                </li>

            </ul>

        </div>

    </div>

</nav>

<!-- MAIN CONTENT -->

<div class="container mt-5">

    {% block content %}
    {% endblock %}

</div>

<!-- FOOTER -->

<footer>

    <h5>
        📚 Library Management System
    </h5>

    <p>

        Built using Flask, Bootstrap,
        HTML, CSS, JavaScript, and SQLite.

    </p>

    <p class="mb-0">

        © 2026 All Rights Reserved

    </p>

</footer>

<!-- Bootstrap JS -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- DARK MODE -->

<script>

function toggleDarkMode() {

    document.body.classList.toggle(
        "dark-mode"
    );

}

</script>

<!-- LOGOUT -->

<script>

function logout() {

    localStorage.removeItem(
        "loggedIn"
    );

    localStorage.removeItem(
        "userEmail"
    );

    alert(
        "Logged out successfully"
    );

    window.location.href = "/";

}

</script>

</body>

</html>
